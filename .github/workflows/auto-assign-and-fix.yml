name: Auto-assign and fix issues
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  assign-and-fix:
    # Only run on issues that are not pull requests and don't already have an assignee
    if: >-
      github.event.issue.pull_request == null &&
      github.event.issue.assignee == null
    runs-on: ubuntu-latest

    steps:
      - name: Assign Copilot to the issue
        continue-on-error: true
        uses: actions/github-script@v7
          script: |
            // Assign Copilot as the issue handler
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['copilot']
            });

      - name: Trigger Copilot coding agent
        uses: actions/github-script@v7
        with:
          script: |
            // Create a comment to trigger Copilot to work on the issue
            // Copilot will scope the fix, create a branch, implement non-major
            // changes, and open a PR targeting main.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '@copilot Please investigate this issue and scope the required fix.',
                '',
                'If the fix is a **minor or moderate change** (not a major refactor or architectural change):',
                '1. Create a new branch from `main`.',
                '2. Implement the fix.',
                '3. Open a pull request targeting `main` for review.',
                '',
                'If the fix requires **major changes**, add a comment explaining the scope',
                'and what would be involved, then label the issue as `needs-discussion`',
                'so a human can review the approach before proceeding.'
              ].join('\n')
            });
